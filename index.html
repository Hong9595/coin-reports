<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>coin reports</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f7efe0, #eef7f4);
      color: #1f2421;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
    }
    main {
      width: min(720px, calc(100% - 32px));
      padding: 32px;
      border: 1px solid #ded5c4;
      border-radius: 28px;
      background: rgba(255, 250, 240, 0.86);
      box-shadow: 0 18px 50px rgba(44, 35, 20, 0.14);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 7vw, 64px);
      letter-spacing: -0.04em;
    }
    p, a {
      font-size: 18px;
      line-height: 1.7;
    }
    a {
      color: #0f766e;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>coin reports</h1>
    <p>Latest public market reports generated by v2-vision-codex.</p>
    <p><a href="./reports/btc/latest.html">Open latest BTC report</a></p>
  </main>
</body>
</html>
